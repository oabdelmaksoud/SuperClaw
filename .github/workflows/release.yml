name: release
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
jobs:
  validate-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate skills
        run: |
          bash scripts/port-check.sh
          bash scripts/validate-skills.sh
          bash scripts/hook-parity-check.sh
      - name: Build artifact
        run: |
          tar -czf openclaw-ecc-${GITHUB_REF_NAME}.tar.gz skills scripts *.md references upstream || true
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-ecc-${{ github.ref_name }}
          path: openclaw-ecc-*.tar.gz
